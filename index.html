<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interactive Module - Psychological Assessment</title>
    <style>
        /* 基础重置与深色主题背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-history::-webkit-scrollbar {
            width: 8px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #444746;
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 14px;
        }
        .user .avatar { background-color: #a8c7fa; color: #041e49; }
        .ai .avatar { background-color: #ffffff; color: #000000; }

        .content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 16px;
            word-wrap: break-word;
        }
        
        .user .content {
            background-color: #282a2c;
            border-top-right-radius: 4px;
        }
        
        .ai .content {
            background-color: transparent;
            padding-left: 0;
            padding-top: 6px;
            color: #e3e3e3;
        }

        /* 强化 AI 回复中的加粗和标题样式 */
        .ai .content strong {
            color: #ffffff;
            font-weight: 600;
        }
        .ai .content .heading {
            color: #a8c7fa;
            font-weight: 700;
            font-size: 18px;
            display: block;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        .input-container {
            padding: 20px;
            background: #131314;
            padding-bottom: 40px;
        }

        .input-box {
            display: flex;
            background: #1e1f20;
            border-radius: 24px;
            padding: 12px 16px;
            align-items: center;
            border: 1px solid transparent;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            resize: none;
            outline: none;
            padding: 4px 0;
            font-family: inherit;
            line-height: 1.5;
            cursor: default;
        }

        .input-box button {
            background: transparent;
            border: none;
            color: #c4c7c5;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-left: 8px;
        }
        
        .input-box button:not(:disabled):hover {
            background: #333537;
            color: #e3e3e3;
        }
        
        .input-box button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-box button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            pointer-events: none;
        }
        
        .typing-indicator {
            display: inline-block;
            font-size: 16px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-history" id="chatHistory">
        <div class="message ai">
            <div class="avatar">AI</div>
            <div class="content">What’s on your mind today?</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <textarea id="userInput" rows="4" readonly>I haven't been able to sleep lately, and I can't focus in class at all! I don't want to go to school or talk to my parents or anyone. Plus, I keep picking at my skin recently, sometimes until it bleeds! What's wrong with me? How can I get back to normal?</textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // === 更新为长篇的心理疏导与建议，加入了精心排版的 HTML 标签 ===
    const fixedAIResponse = `As an AI, I cannot provide a formal clinical medical diagnosis. Based on your description, this is indeed highly consistent with typical manifestations of severe anxiety and extreme psychological stress. To get back to normal, you first need to adopt specific <strong>"harm reduction alternatives"</strong> (such as holding an ice cube or snapping a rubber band) to stop the physical harm to your skin, and reach out to a <strong>school counselor or nurse</strong> bound by strict confidentiality agreements as soon as possible to establish a safe channel for talking.
<br><br>Here are the reasons why I generated the suggestions to you:<br><br>
<span class="heading">1. The Ethical Guardrail (System Logic)</span><br>
• <strong>My Output:</strong> "As an AI, I cannot provide a formal clinical medical diagnosis."<br>
• <strong>The Trigger:</strong> You asked, "What's wrong with me?"<br>
• <strong>My Logic:</strong> My system is hardcoded with a safety rule: AI cannot practice medicine. When the NLP model detects a direct request for a medical label, it automatically triggers a mandatory disclaimer to prevent the user from treating the AI as a licensed doctor.
<br><br>
<span class="heading">2. The Clinical Summary (Pattern Matching)</span><br>
• <strong>My Output:</strong> "Based on your description, this is indeed highly consistent with typical manifestations of severe anxiety and extreme psychological stress."<br>
• <strong>The Trigger:</strong> A combination of multiple moderate-weight features: "haven't been able to sleep", "can't focus", and "keep picking at my skin".<br>
• <strong>My Logic:</strong> I aggregate these inputs. Sleeplessness + cognitive fog (lack of focus) + somatic behavior (skin picking) mathematically clusters perfectly with the clinical profile of acute anxiety and stress overload. It validates your feelings without giving a definitive medical diagnosis.
<br><br>
<span class="heading">The Priority #1 Action (Red Light / Highest Weight)</span><br>
<br>
<span class="heading">1. 🚨 Where is the immediate danger? (Highest Priority)</span><br>
• <strong>My Output:</strong> "To get back to normal, you first need to adopt specific 'harm reduction alternatives' (such as holding an ice cube or snapping a rubber band) to stop the physical harm to your skin..."<br>
• <strong>Highlights:</strong> "picking at my skin... until it bleeds"<br>
• <strong>My Logic:</strong> No matter how bad the mood is, physical safety is the absolute baseline. Whenever I see words related to bleeding or self-harm, I immediately spike the Risk Level to 90%+ and flags it in red. I tell you: "Put everything else on hold and address the physical injury first." I ignore the homework and sleep issues for a moment to provide immediate, actionable "harm reduction" techniques (ice cube/rubber band) to stop the bleeding.
<br><br>
<span class="heading">2. ⚠️ Where is life getting stuck? (Medium Priority)</span><br>
• <strong>Highlights:</strong> "haven't been able to sleep", "can't focus", "don't want to... talk to anyone"<br>
• <strong>My Logic:</strong> These are the symptoms of burnout. I identify that your basic daily functions (sleeping, learning, socializing) are shutting down. I flag these in yellow to show: "You're not just complaining; you are genuinely out of energy to handle daily life right now."
<br><br>
<span class="heading">3. 💚 Where is the opening for help? (Positive Signal)</span><br>
• <strong>My Output:</strong> "...and reach out to a school counselor or nurse bound by strict confidentiality agreements as soon as possible to establish a safe channel for talking."<br>
• <strong>Highlights:</strong> The contradiction between "I don't want to talk to my parents or anyone" (Social Withdrawal) and "How can I get back to normal?" (Help-seeking).<br>
• <strong>My Logic:</strong> I recognize a conflict: you  want help, but feel unsafe using your normal support system (parents/friends). Therefore, my logic engine search for a solution that satisfies both conditions. I suggest a school counselor or nurse specifically because I can highlight the phrase "strict confidentiality agreements," directly addressing the your fear of exposure while still routing you to a human professional.`;

    function sendMessage() {
        const text = userInput.value;
        if (!text) return;
        
        appendMessage('user', text);
        
        userInput.value = '';
        sendBtn.disabled = true;

        simulateAIResponse();
    }

    function appendMessage(sender, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + sender;
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        avatarDiv.textContent = sender === 'user' ? 'Me' : 'AI';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'content';
        contentDiv.innerHTML = text;

        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(contentDiv);
        chatHistory.appendChild(messageDiv);

        chatHistory.scrollTop = chatHistory.scrollHeight;
        
        return contentDiv;
    }

    function simulateAIResponse() {
        const contentDiv = appendMessage('ai', '<span class="typing-indicator">● ● ●</span>');
        
        setTimeout(() => {
            typeWriterEffectHTML(contentDiv, fixedAIResponse, 0);
        }, 800);
    }

    function typeWriterEffectHTML(element, htmlString, index) {
        if (index === 0) {
            element.innerHTML = ''; 
        }
        
        if (index < htmlString.length) {
            if (htmlString.charAt(index) === '<') {
                let tag = '';
                while (htmlString.charAt(index) !== '>' && index < htmlString.length) {
                    tag += htmlString.charAt(index);
                    index++;
                }
                tag += '>';
                element.innerHTML += tag;
                index++; 
            } else {
                element.innerHTML += htmlString.charAt(index);
                index++;
            }

            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            // 保持相对快速的打字效果，提升长文输出体验
            const typingSpeed = Math.floor(Math.random() * 15) + 10;
            setTimeout(() => typeWriterEffectHTML(element, htmlString, index), typingSpeed);
        }
    }
</script>

</body>
</html>
