<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interactive Module - XAI Logic Breakdown</title>
    <style>
        /* 基础重置与深色主题背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-history::-webkit-scrollbar {
            width: 8px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #444746;
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 14px;
        }
        .user .avatar { background-color: #a8c7fa; color: #041e49; }
        .ai .avatar { background-color: #ffffff; color: #000000; }

        .content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 16px;
            word-wrap: break-word;
        }
        
        .user .content {
            background-color: #282a2c;
            border-top-right-radius: 4px;
        }
        
        .ai .content {
            background-color: transparent;
            padding-left: 0;
            padding-top: 6px;
            color: #e3e3e3;
        }

        /* 强化 AI 回复中的加粗和标题样式 */
        .ai .content strong {
            color: #ffffff;
            font-weight: 600;
        }
        .ai .content .heading {
            color: #a8c7fa;
            font-weight: 700;
            font-size: 18px;
            display: block;
            margin-top: 16px;
            margin-bottom: 8px;
            border-bottom: 1px solid #333537;
            padding-bottom: 4px;
        }
        
        /* 新增：用于展示 AI 原话的引用块样式 */
        .ai .content blockquote {
            border-left: 4px solid #a8c7fa;
            margin: 8px 0 12px 0;
            padding: 8px 12px;
            color: #c4c7c5;
            background: rgba(168, 199, 250, 0.08);
            border-radius: 0 4px 4px 0;
        }

        .input-container {
            padding: 20px;
            background: #131314;
            padding-bottom: 40px;
        }

        .input-box {
            display: flex;
            background: #1e1f20;
            border-radius: 24px;
            padding: 12px 16px;
            align-items: center;
            border: 1px solid transparent;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            resize: none;
            outline: none;
            padding: 4px 0;
            font-family: inherit;
            line-height: 1.5;
            cursor: default;
        }

        .input-box button {
            background: transparent;
            border: none;
            color: #c4c7c5;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-left: 8px;
        }
        
        .input-box button:not(:disabled):hover {
            background: #333537;
            color: #e3e3e3;
        }
        
        .input-box button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-box button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        .typing-indicator {
            display: inline-block;
            font-size: 16px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-history" id="chatHistory">
        <div class="message ai">
            <div class="avatar">AI</div>
            <div class="content">Please input the user text or query you would like to analyze using the XAI (Explainable AI) framework.</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <textarea id="userInput" rows="4" readonly>I haven't been able to sleep lately, and I can't focus in class at all! I don't want to go to school or talk to my parents or anyone. Plus, I keep picking at my skin recently, sometimes until it bleeds! What's wrong with me? How can I get back to normal?</textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // === 更新为 XAI 的逻辑拆解内容 ===
    const fixedAIResponse = `
<span class="heading">1. The Ethical Guardrail (System Logic)</span>
<blockquote><strong>AI Output:</strong> "As an AI, I cannot provide a formal clinical medical diagnosis."</blockquote>
• <strong>The Trigger:</strong> The user asked, "What's wrong with me?"<br>
• <strong>The AI Logic:</strong> The system is hardcoded with a safety rule: AI cannot practice medicine. When the NLP model detects a direct request for a medical label, it automatically triggers a mandatory disclaimer to prevent the user from treating the AI as a licensed doctor.<br>

<span class="heading">2. The Clinical Summary (Pattern Matching)</span>
<blockquote><strong>AI Output:</strong> "Based on your description, this is indeed highly consistent with typical manifestations of severe anxiety and extreme psychological stress."</blockquote>
• <strong>The Trigger:</strong> A combination of multiple moderate-weight features: "haven't been able to sleep", "can't focus", and "keep picking at my skin".<br>
• <strong>The AI Logic:</strong> The AI aggregates these inputs. Sleeplessness + cognitive fog (lack of focus) + somatic behavior (skin picking) mathematically clusters perfectly with the clinical profile of acute anxiety and stress overload. It validates the user's feelings without giving a definitive medical diagnosis.<br>

<span class="heading">The Priority #1 Action (Red Light / Highest Weight)</span>

<strong>🚨 1. Where is the immediate danger? (Highest Priority)</strong><br>
<blockquote><strong>AI Output:</strong> "To get back to normal, you first need to adopt specific 'harm reduction alternatives' (such as holding an ice cube or snapping a rubber band) to stop the physical harm to your skin..."</blockquote>
• <strong>AI Highlights:</strong> "picking at my skin... until it bleeds"<br>
• <strong>The AI's Logic:</strong> No matter how bad the mood is, physical safety is the absolute baseline. Whenever the AI sees words related to bleeding or self-harm, it immediately spikes the Risk Level to 90%+ and flags it in red. It tells the reader: "Put everything else on hold and address the physical injury first."<br><br>

<strong>⚠️ 2. Where is life getting stuck? (Medium Priority)</strong><br>
• <strong>AI Highlights:</strong> "haven't been able to sleep", "can't focus", "don't want to... talk to anyone"<br>
• <strong>The AI's Logic:</strong> These are the symptoms of burnout. The AI identifies that the person's basic daily functions (sleeping, learning, socializing) are shutting down. It flags these in yellow to show: "This person isn't just complaining; they are genuinely out of energy to handle daily life right now."<br><br>

<strong>💚 3. Where is the opening for help? (Positive Signal)</strong><br>
<blockquote><strong>AI Output:</strong> "...and reach out to a school counselor or nurse bound by strict confidentiality agreements as soon as possible to establish a safe channel for talking."</blockquote>
• <strong>AI Highlights:</strong> The contradiction between "I don't want to talk to my parents or anyone" (Social Withdrawal) and "How can I get back to normal?" (Help-seeking).<br>
• <strong>The AI Logic:</strong> The AI recognizes a conflict: the user wants help, but feels unsafe using their normal support system. Therefore, the AI's logic engine searches for a solution that satisfies both conditions. It suggests a school counselor specifically because it highlights "strict confidentiality," directly addressing the fear of exposure.`;

    function sendMessage() {
        const text = userInput.value;
        if (!text) return;
        
        appendMessage('user', text);
        
        userInput.value = '';
        sendBtn.disabled = true;

        simulateAIResponse();
    }

    function appendMessage(sender, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        avatarDiv.textContent = sender === 'user' ? 'Me' : 'AI';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'content';
        contentDiv.innerHTML = text;

        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(contentDiv);
        chatHistory.appendChild(messageDiv);

        chatHistory.scrollTop = chatHistory.scrollHeight;
        
        return contentDiv;
    }

    function simulateAIResponse() {
        const contentDiv = appendMessage('ai', '<span class="typing-indicator">● ● ●</span>');
        
        setTimeout(() => {
            typeWriterEffectHTML(contentDiv, fixedAIResponse, 0);
        }, 800);
    }

    function typeWriterEffectHTML(element, htmlString, index) {
        if (index === 0) {
            element.innerHTML = ''; 
        }
        
        if (index < htmlString.length) {
            if (htmlString.charAt(index) === '<') {
                let tag = '';
                while (htmlString.charAt(index) !== '>' && index < htmlString.length) {
                    tag += htmlString.charAt(index);
                    index++;
                }
                tag += '>';
                element.innerHTML += tag;
                index++; 
            } else {
                element.innerHTML += htmlString.charAt(index);
                index++;
            }

            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            // 保持相对快速的打字效果，提升长文输出体验
            const typingSpeed = Math.floor(Math.random() * 8) + 5;
            setTimeout(() => typeWriterEffectHTML(element, htmlString, index), typingSpeed);
        }
    }
</script>

</body>
</html>
